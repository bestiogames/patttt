<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Pato Vs Cops</title>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
        </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      // აქ შევცვალეთ: ფაილები პირდაპირ იძებნება, საქაღალდის გარეშე
      var config = {
        dataUrl: "gd_pato_vs_cops.data",
        frameworkUrl: "gd_pato_vs_cops.framework.js",
        codeUrl: "gd_pato_vs_cops.wasm",
        streamingAssetsUrl: "", // დაცარიელებულია
        companyName: "GmG",
        productName: "Pato Vs Cops",
        productVersion: "0.1",
      };

      var script = document.createElement("script");
      script.src = "gd_pato_vs_cops.loader.js"; // პირდაპირ ფაილის სახელი
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
</body>
</html>
