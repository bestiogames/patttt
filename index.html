<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Pato Vs Cops</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        #unity-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #unity-canvas { width: 100%; height: 100%; }
        #unity-loading-bar { position: absolute; bottom: 20px; left: 20px; right: 20px; height: 10px; background: #333; }
        #unity-progress-bar-full { height: 100%; width: 0%; background: #0f0; }
    </style>
    <script async src="//api.adinplay.com/libs/aiptag/pub/GGS/granny.games/tag.min.js"></script>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>

    <script>
        var canvas = document.querySelector("#unity-canvas");
        var config = {
            dataUrl: "gd_pato_vs_cops.data",
            frameworkUrl: "gd_pato_vs_cops.framework.js",
            codeUrl: "gd_pato_vs_cops.wasm",
            // ვაცარიელებთ სტრიმინგ ასეთებს, რომ 404 არ მოგცეთ
            streamingAssetsUrl: "", 
            companyName: "GmG",
            productName: "Pato Vs Cops",
            productVersion: "0.1",
        };

        var script = document.createElement("script");
        script.src = "gd_pato_vs_cops.loader.js";
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
            }).catch((message) => {
                console.error(message);
                alert("თამაშის ჩატვირთვა ვერ მოხერხდა: " + message);
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
