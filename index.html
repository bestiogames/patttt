<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Pato Vs Cops</title>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600></canvas>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      
      // ეს არის ყველაზე მნიშვნელოვანი ნაწილი შენი სტრუქტურისთვის
      var buildUrl = "Build";
      var config = {
        dataUrl: buildUrl + "/gd_pato_vs_cops.data",
        frameworkUrl: buildUrl + "/gd_pato_vs_cops.framework.js",
        codeUrl: buildUrl + "/gd_pato_vs_cops.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "GmG",
        productName: "Pato Vs Cops",
        productVersion: "0.1",
      };

      var script = document.createElement("script");
      script.src = buildUrl + "/gd_pato_vs_cops.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          console.log("Loading: " + (100 * progress) + "%");
        }).then((unityInstance) => {
          console.log("Unity loaded!");
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
