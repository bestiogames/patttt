<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Pato Vs Cops</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width=960 height=600></canvas>
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
        </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var config = {
        dataUrl: "gd_pato_vs_cops.data",
        frameworkUrl: "gd_pato_vs_cops.framework.js",
        codeUrl: "gd_pato_vs_cops.wasm",
        streamingAssetsUrl: "", // 404-ების თავიდან ასაცილებლად
        companyName: "GmG",
        productName: "Pato Vs Cops",
        productVersion: "0.1",
      };

      var script = document.createElement("script");
      script.src = "gd_pato_vs_cops.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).catch((message) => alert(message));
      };
      document.body.appendChild(script);
    </script>
</body>
</html>
