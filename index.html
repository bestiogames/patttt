<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Pato Vs Cops</title>
    <link rel="canonical" href="https://www.meegames.com/en/game/3087-pato-vs-cops.html" />
    <link rel="shortcut icon" href="https://bestiogames.github.io/patttt/favicon.ico">
    <link rel="stylesheet" href="https://bestiogames.github.io/patttt/style.css">
    <link rel="manifest" href="https://bestiogames.github.io/patttt/manifest.webmanifest">
    
    <script async src="//api.adinplay.com/libs/aiptag/pub/GGS/granny.games/tag.min.js"></script>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div class="box__full">
                <div class="progress__wrap">
                    <div id="unity-progress-bar-empty">
                        <div class="box__full">
                            <div id="unity-progress-bar-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="unity-warning"> </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var config = {
        arguments: [],
        dataUrl: "https://bestiogames.github.io/patttt/gd_pato_vs_cops.data",
        frameworkUrl: "https://bestiogames.github.io/patttt/gd_pato_vs_cops.framework.js",
        codeUrl: "https://bestiogames.github.io/patttt/gd_pato_vs_cops.wasm",
        streamingAssetsUrl: "", // აქ შევცვალე ცარიელ სტრიქონად, რათა 404 შეცდომა აღარ მოგცეთ
        companyName: "GmG",
        productName: "Pato Vs Cops",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      canvas.style.background = "url('https://bestiogames.github.io/patttt/gd_pato_vs_cops.jpg') center / cover";
      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = "https://bestiogames.github.io/patttt/gd_pato_vs_cops.loader.js";
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
</body>
</html>
